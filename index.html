<!DOCTYPE html>

<html>

<head>

<title>KFanverse Login</title>

<link rel="icon" type="image/png" href="images/favicon.jpg">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body class="login-page">

<div class="login-wrapper">

    <div class="login-form-side">

        <div class="login-form-box">

            <img src="images/logo.png" class="login-logo" alt="KFanverse Logo">

            <h2>Login</h2>

            <p class="form-desc">Welcome back to KFanverse, your kpop universe all in one place.</p>

            <label>Email Address</label>

            <input type="text" id="loginUsername" placeholder="Enter username">

            <label>Password</label>

            <input type="password" id="loginPassword" placeholder="Enter your password">

            <div class="login-options">

                <label class="remember-me">

                    <input type="checkbox"> Keep me logged in

                </label>

                <a href="#">Forgot password?</a>

            </div>

            <button class="login-btn" onclick="enterSite()">Log in</button>

            <button class="register-btn" onclick="window.location.href='signup.html'">Sign Up</button>

            <p class="register-text">

			Don’t have an account?

			<span onclick="window.location.href='signup.html'">

			Create account

			</span>

			</p>
			
			<div class="demo-login-strip">

			<h3>Demo Login</h3>

			<div class="demo-login-grid">

        <div>

            <strong>Superadmin</strong>

            <span>superadmin / superadmin</span>

        </div>

        <div>

            <strong>Admin</strong>

            <span>admin / admin</span>

        </div>

        <div>

            <strong>User</strong>

            <span>user / user</span>

        </div>

    </div>

</div>

        </div>

    </div>

    <div class="login-image-side">

        <video autoplay muted loop playsinline class="login-video">

<source src="images/login-bg.mp4" type="video/mp4">

</video>

        <div class="login-image-overlay">

            <div class="overlay-card">

                <h1>KFanverse</h1>

                <p>your kpop universe all in one place</p>

            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
