<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KFanverse Signup</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body class="login-page">

<div class="login-wrapper">

<div class="login-form-side">

<div class="login-form-box">

<img src="images/logo.png" class="login-logo" alt="KFanverse Logo">

<h2>Create Account</h2>

<p class="form-desc">Join KFanverse and start exploring your K-pop universe.</p>

<label>Username</label>

<input type="text" placeholder="Enter username">

<label>Email</label>

<input type="email" placeholder="Enter email">

<label>Password</label>

<input type="password" placeholder="Create password">

<label>Confirm Password</label>

<input type="password" placeholder="Confirm password">

<button class="login-btn" onclick="window.location.href='main.html'">Create Account</button>

<p class="register-text">

Already have an account? <span onclick="window.location.href='index.html'">Log in</span>

</p>

</div>

</div>

<div class="login-image-side">

<video autoplay muted loop playsinline class="login-video">

<source src="images/login-bg.mp4" type="video/mp4">

</video>

<div class="login-image-overlay">

<div class="overlay-card">

<h1>KFanverse</h1>

<p>your kpop universe all in one place</p>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
